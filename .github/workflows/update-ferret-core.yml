name: Update Ferret Core

on:
  repository_dispatch:
    types: [ferret-core-released]

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      FERRET_VERSION: ${{ github.event.client_payload.version }}
    steps:
      - name: Validate dispatch payload
        id: metadata
        run: |
          semver_pattern='^v2\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$FERRET_VERSION" =~ $semver_pattern ]]; then
            echo "::error title=Invalid Ferret release version::Expected a v2 SemVer tag, got '$FERRET_VERSION'."
            exit 1
          fi

          update_branch="deps/ferret-core-${FERRET_VERSION#v}"
          git check-ref-format --branch "$update_branch"
          echo "branch=$update_branch" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FERRET_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.FERRET_RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Update Ferret Core dependency
        id: dependency
        run: |
          go get "github.com/MontFerret/ferret/v2@${FERRET_VERSION}"
          go mod tidy
          git add -- go.mod go.sum

          if git diff --cached --quiet -- go.mod go.sum; then
            echo "Ferret Core is already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.dependency.outputs.changed == 'true'
        run: go test ./...

      - name: Build
        if: steps.dependency.outputs.changed == 'true'
        run: make compile

      - name: Commit and push update branch
        if: steps.dependency.outputs.changed == 'true'
        env:
          UPDATE_BRANCH: ${{ steps.metadata.outputs.branch }}
        run: |
          if ! git diff --quiet; then
            echo "::error title=Unexpected generated changes::Validation modified tracked files outside the staged dependency update."
            git status --short
            exit 1
          fi

          git config user.name "ferret-release[bot]"
          git config user.email "ferret-release[bot]@users.noreply.github.com"
          git switch -c "$UPDATE_BRANCH"
          git commit -m "chore(deps): update Ferret Core to ${FERRET_VERSION}"

          remote_ref="refs/heads/${UPDATE_BRANCH}"
          tracking_ref="refs/remotes/origin/${UPDATE_BRANCH}"
          if git ls-remote --exit-code --heads origin "$remote_ref" >/dev/null; then
            git fetch origin "${remote_ref}:${tracking_ref}"
          fi

          git push --force-with-lease --set-upstream origin "HEAD:${remote_ref}"

      - name: Create or reuse pull request
        if: steps.dependency.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPDATE_BRANCH: ${{ steps.metadata.outputs.branch }}
        run: |
          existing_pr="$(gh pr list --state open --head "$UPDATE_BRANCH" --json url --jq '.[0].url // empty')"
          if [[ -n "$existing_pr" ]]; then
            echo "Updated existing pull request: $existing_pr"
            exit 0
          fi

          gh pr create --base "$DEFAULT_BRANCH" --head "$UPDATE_BRANCH" --title "chore(deps): update Ferret Core to ${FERRET_VERSION}" --body "Automated Ferret Core dependency update triggered by Ferret Core release ${FERRET_VERSION}."
